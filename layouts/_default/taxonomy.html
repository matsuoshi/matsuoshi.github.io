{{ define "main" }}
  {{ $tag := .Title }}
  {{ $count := len .Pages }}

  <section style="padding:36px 32px 28px;border-bottom:0.5px solid var(--border);">
    <p style="font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;color:var(--text3);">tag</p>
    <h1 style="font-size:22px;font-weight:400;letter-spacing:-.01em;margin-bottom:6px;color:var(--text);">#{{ $tag }}</h1>
    <p style="font-size:13px;font-weight:300;color:var(--text2);">{{ $count }} article{{ if ne $count 1 }}s{{ end }}</p>
  </section>

  {{ partial "article-list.html" (dict "page" . "activeTag" $tag) }}
{{ end }}
