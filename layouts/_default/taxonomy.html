{{ define "main" }}
  {{ $tag := .Title }}
  {{ $count := len .Pages }}

  <section class="pt-9 px-8 pb-7">
    <h1 class="text-[22px] font-normal tracking-[-.01em] mb-1.5 text-fg">#{{ $tag }}</h1>
    <p class="text-[13px] font-light text-fg2">{{ $count }} article{{ if ne $count 1 }}s{{ end }}</p>
  </section>

  {{ partial "article-list.html" (dict "page" . "activeTag" $tag) }}
{{ end }}
