<header class="site-header sticky top-0 z-50 flex items-center justify-between px-8 py-[12px]">
  <a href="/" class="flex items-center gap-2.5 no-underline" aria-label="{{ .Site.Title }}">
    <svg width="26" height="26" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="32" height="32" rx="6" fill="var(--text)"/>
      <text x="6" y="23" font-family="Georgia, serif" font-size="18" fill="var(--bg)">m</text>
    </svg>
    {{ if not .IsHome }}
      <span class="text-sm font-light tracking-[.02em] text-fg">{{ .Site.Title }}</span>
    {{ end }}
  </a>
  <div class="flex items-center gap-5">
    <a href="/about" class="text-[13px] text-fg2 no-underline transition-colors duration-150 hover:text-accent">about</a>
    <a href="/tags/" class="text-[13px] text-fg2 no-underline transition-colors duration-150 hover:text-accent">tags</a>
    <button id="theme-toggle" class="flex items-center gap-1.5 text-xs px-3 py-1 rounded-full border-[0.5px] border-line2 text-fg2 cursor-pointer font-[inherit]" aria-label="テーマ切り替え">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
      <svg id="icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<script>
  (function() {
    var html = document.documentElement;
    var toggle = document.getElementById('theme-toggle');
    var moon = document.getElementById('icon-moon');
    var sun = document.getElementById('icon-sun');

    function update() {
      var dark = html.classList.contains('dark');
      moon.classList.toggle('hidden', dark);
      sun.classList.toggle('hidden', !dark);
    }

    update();

    toggle.addEventListener('click', function() {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      update();
    });
  })();
</script>
