{{ $activeTag := .activeTag }}
{{ $terms := .terms }}
{{ $limit := .limit | default 16 }}
<section class="px-8 pt-10 mt-10">
  <p class="tracking-[.08em] mb-3 text-fg2">
    <a href="/tags/" class="hover:text-accent">Tags</a>
  </p>
  <div class="flex flex-wrap gap-[5px] -ml-[7px]">
    {{ range first $limit $terms }}
      {{ $name := .Page.Title | default .Name }}
      {{ partial "tag-pill.html" (dict "name" $name "href" .Page.RelPermalink) }}
    {{ end }}
  </div>
</section>
