{{ $activeTag := .activeTag }}
{{ $terms := .terms }}
{{ $limit := .limit | default 20 }}
<section class="px-8 pt-10">
  <p class="text-[11px] font-normal tracking-[.08em] mb-3 text-fg3">tags</p>
  <div class="flex flex-wrap gap-[5px] -ml-[7px]">
    {{ range first $limit $terms }}
      {{ $name := .Page.Title | default .Name }}
      {{ partial "tag-pill.html" (dict "name" $name "href" .Page.RelPermalink) }}
    {{ end }}
  </div>
</section>
