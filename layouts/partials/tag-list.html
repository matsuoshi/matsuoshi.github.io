{{ $activeTag := .activeTag }}
{{ $tags := .tags }}
<section style="padding:36px 32px 0;">
  <p style="font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;color:var(--text3);">browse by tag</p>
  <div style="display:flex;flex-wrap:wrap;gap:7px;">
    <a href="/" class="tag-filter{{ if not $activeTag }} active{{ end }}">all</a>
    {{ range $tags }}
      <a href="/tags/{{ . | urlize }}" class="tag-filter{{ if eq . $activeTag }} active{{ end }}">{{ . }}</a>
    {{ end }}
  </div>
</section>
