{{ $pag := .Paginator }}
{{ if gt $pag.TotalPages 1 }}
<nav style="display:flex;align-items:center;justify-content:center;gap:6px;padding:28px 32px 0;" aria-label="ページネーション">
  {{ if $pag.HasPrev }}
    <a href="{{ $pag.Prev.URL }}" class="pg-btn" aria-label="前のページ">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
  {{ else }}
    <span class="pg-btn disabled" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </span>
  {{ end }}

  {{ range $pag.Pagers }}
    <a href="{{ .URL }}" class="pg-btn{{ if eq . $pag }} active{{ end }}" {{ if eq . $pag }}aria-current="page"{{ end }}>
      {{ .PageNumber }}
    </a>
  {{ end }}

  {{ if $pag.HasNext }}
    <a href="{{ $pag.Next.URL }}" class="pg-btn" aria-label="次のページ">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </a>
  {{ else }}
    <span class="pg-btn disabled" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </span>
  {{ end }}
</nav>
{{ end }}
