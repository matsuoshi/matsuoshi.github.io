{{ $post := . }}
<article class="group">
  <a href="{{ $post.RelPermalink }}" class="block no-underline">
    <div class="w-full aspect-video overflow-hidden rounded-lg bg-bg3 mb-3">
      {{ if $post.Params.thumbnail }}
        <img src="{{ $post.Params.thumbnail }}" alt="{{ $post.Params.thumbnailAlt | default "" }}" class="block w-full h-full object-cover transition-opacity duration-[180ms] group-hover:opacity-70" />
      {{ end }}
    </div>
    <div class="px-0.5">
      <h2 class="text-[13px] font-normal leading-[1.45] mb-[5px] text-fg transition-colors duration-150 group-hover:text-accent">
        {{ $post.Title }}
      </h2>
      <div class="flex flex-wrap gap-[5px] -ml-[7px]">
        {{ range $post.Params.tags }}
          <a href="/tags/{{ . | urlize }}" class="inline-block text-[10px] font-light px-[7px] py-0.5 rounded-full cursor-pointer transition-colors duration-150 bg-tagbg text-fg3 hover:text-fg2 no-underline" onclick="event.stopPropagation()">{{ . }}</a>
        {{ end }}
      </div>
      <time class="text-[11px] font-light text-fg3">
        {{ $post.Date.Format "2006-01-02" }}
      </time>
    </div>
  </a>
</article>
