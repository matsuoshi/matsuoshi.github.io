{{ $page := .page }}
{{ $activeTag := .activeTag }}

<div class="px-7 pt-7">
  <div class="grid grid-cols-1 min-[480px]:grid-cols-2 md:grid-cols-3 gap-10">
    {{ range $page.Paginator.Pages }}
      {{ partial "article-card.html" . }}
    {{ end }}
  </div>
</div>

{{ partial "pagination.html" $page }}

<div class="mt-auto">
  {{ partial "tag-list.html" (dict "terms" $page.Site.Taxonomies.tags.ByCount "activeTag" $activeTag) }}
</div>
